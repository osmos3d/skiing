<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css" crossorigin="anonymous">

  



  </head>
  <body id="app" v-cloak>
    <div class="row">
      <div class='container'>
        <div class="col" >
        	<ul class="list-group"> 
          		  <li  class="list-group-item"
                  v-for="(item,index) in at"
                  v-bind:id = 'index'
                  :key="index">

                <div class='pos'>
                 {{ index +1}} 
                </div>
                <div class='number'>
                 {{ item.num }} 
                </div>
            		<div class="name">
                {{ item.name }} </br>
                </div>
                <div class="result">
                {{ item.result  }} </br>
                </div>

          		</li>
        	</ul>
        </div>
       
      </div>

    </div>



  <script src="js/jquery.min.js"></script>
  <script type="text/javascript" type="text/javascript" src="js/bootstrap.min.js"> </script>
  <script type="text/javascript" type="text/javascript" src="js/axios.min.js"> </script>
  <script type="text/javascript" type="text/javascript" src="js/jquery-3.6.1.min.js"> </script>
  <script src="js/vue.global.js"></script>
  <script type="module" src="js/app.js"></script>

  </body>
  </html>
